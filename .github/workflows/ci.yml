name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes ripgrep

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Prime locked runtime cache for offline install smoke
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          requirements="${RUNNER_TEMP}/pony-runtime-requirements.txt"
          primer="${RUNNER_TEMP}/pony-cache-primer"
          uv export --frozen --no-dev --no-emit-project --output-file "${requirements}"
          uv venv --python .venv/bin/python "${primer}"
          uv pip install --refresh --python "${primer}/bin/python" --requirement "${requirements}"

      - name: Python 3.11 compatibility tests
        if: matrix.python-version == '3.11'
        run: uv run --frozen pytest -q tests

      - name: Exact-head offline gate
        if: matrix.python-version == '3.12'
        run: ./scripts/check.sh

  macos-focused:
    name: macOS focused (Python 3.12)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Prove FIFO metadata probes use spawn
        run: >-
          uv run pytest -vv -W error::DeprecationWarning
          tests/test_safe_subprocess.py::test_hardened_git_rejects_fifo_metadata_without_blocking

      - name: Focused security and durability tests
        run: >-
          uv run pytest -q -W error::DeprecationWarning
          tests/test_project_env_security.py
          tests/test_file_lock.py
          tests/test_private_paths.py
          tests/test_artifact_security.py
          tests/test_safe_subprocess.py
          tests/test_shell_execution_security.py
          tests/test_shell_security_corpus.py
          tests/test_legacy_artifacts.py
          tests/memory/test_block_store.py
          tests/memory/test_reader_bounds.py
          tests/memory/test_retrieval.py
